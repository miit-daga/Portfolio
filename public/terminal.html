<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miit Daga - Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default theme: teal (matches the portfolio's cosmic palette) */
            --term-primary: #2dd4bf;
            --term-accent: #67e8f9;
            --term-ghost: rgba(45, 212, 191, 0.3);
        }
        body {
            background-color: #000;
            color: var(--term-primary);
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
        }
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.3;
        }
        #terminal {
            width: 100%;
            height: 100vh;
            padding: 1.5rem;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        #terminal::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }
        .prompt::before {
            content: 'intruder@miit-daga:~$ \00a0';
            color: var(--term-primary);
            font-weight: 700;
        }
        .output {
            white-space: pre-wrap;
        }
        .input-container {
            position: relative;
            flex-grow: 1;
            height: 1.5em; 
        }
        #input-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            caret-color: var(--term-primary);
            background: transparent;
            border: none;
            outline: none;
            color: var(--term-primary);
            font-family: 'Roboto Mono', monospace;
            z-index: 10;
        }
        #ghost-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--term-ghost);
            font-family: 'Roboto Mono', monospace;
            z-index: 5;
            pointer-events: none;
        }
        .nav-link {
            color: var(--term-accent);
            text-decoration: underline;
            cursor: pointer;
        }
        .nav-link:hover {
            background-color: var(--term-accent);
            color: #000;
        }
        .section-title {
            color: var(--term-accent);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        .ascii-art {
            white-space: pre;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: var(--term-primary);
        }
        .error-text { color: #ff3333; }
        .highlight-name { color: #fff; font-weight: 700; }
        .highlight-date { color: #888; }
        .highlight-dim { color: #6a6; }
        .highlight-value { color: var(--term-accent); }
        .help-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.25rem 2rem;
            margin-top: 0.5rem;
        }
        .help-category {
            color: #888;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8em;
            margin-top: 0.75rem;
            margin-bottom: 0.25rem;
            letter-spacing: 0.1em;
        }
        /* Overlay Style */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>

        // --- SOUND ENGINE ---
        const SoundFX = {
            ctx: null,
            isMuted: false,
            
            init: function() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                } else if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            playTone: function(freq, type, duration, vol = 0.1) {
                if (this.isMuted || !this.ctx || this.ctx.state !== 'running') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.frequency.value = freq;
                osc.type = type;
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                const now = this.ctx.currentTime;
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(vol, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                
                osc.start(now);
                osc.stop(now + duration);
            },

            // --- USER TYPING SOUNDS ---
            typing: function(key) {
                if (this.isMuted) return;

                let freq = 800;
                let type = 'square';
                let duration = 0.06;
                let vol = 0.05;

                if (key >= '0' && key <= '9') {
                    const num = parseInt(key);
                    freq = 1000 + (num * 100); 
                    type = 'sine'; 
                    duration = 0.08;
                    vol = 0.08;
                }
                else if (key.length === 1 && key.match(/[a-z]/i)) {
                    const code = key.toLowerCase().charCodeAt(0) - 97; 
                    freq = 200 + (code * 15);
                    type = 'square'; 
                }
                else if (key === ' ') {
                    freq = 120;
                    type = 'sawtooth';
                    duration = 0.05;
                    vol = 0.08;
                }
                else if (key === 'Backspace') {
                    freq = 100;
                    type = 'sawtooth';
                    duration = 0.08;
                }
                else {
                    freq = 800;
                    type = 'triangle';
                }

                this.playTone(freq, type, duration, vol);
            },

            // --- SYSTEM SOUNDS ---
            startup: function() {
                if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 2);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 1);
                gain.gain.linearRampToValueAtTime(0, now + 2);

                osc.start(now);
                osc.stop(now + 2);
            },

            dataBurst: function() {
                if (this.isMuted || !this.ctx) return;
                const count = 15;
                for(let i=0; i<count; i++) {
                    setTimeout(() => {
                        this.playTone(400 + Math.random() * 800, 'square', 0.05, 0.03);
                    }, i * 30);
                }
            },

            compute: function() {
                if (this.isMuted || !this.ctx) return;
                this.playTone(200 + Math.random() * 50, 'sawtooth', 0.1, 0.05);
            },

            deleteProcess: function() {
                // Low crunching/processing sound
                if (this.isMuted || !this.ctx) return;
                const count = 6;
                for(let i=0; i<count; i++) {
                    setTimeout(() => {
                        this.playTone(100, 'square', 0.05, 0.05);
                    }, i * 150);
                }
            },

            funny: function() {
                // A "slide whistle" / clown sound
                if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.type = 'triangle';
                const now = this.ctx.currentTime;
                
                // Slide up then down
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.1);
                osc.frequency.linearRampToValueAtTime(300, now + 0.4);

                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);

                osc.start(now);
                osc.stop(now + 0.4);
            },

            successChime: function() {
                if (this.isMuted || !this.ctx) return;
                [440, 554, 659].forEach((freq, i) => { 
                    setTimeout(() => {
                        this.playTone(freq, 'sine', 0.6, 0.05);
                    }, i * 100);
                });
            },

            enter: function() {
                if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.1);
            },

                        this.playTone(Math.random() * 1000, 'sawtooth', 0.05, 0.05);

                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1);
                osc.start();
                osc.stop(this.ctx.currentTime + 1);
            }
        };

        // --- MATRIX CANVAS ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const characters = katakana + alphabet;
        
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        // Drives the matrix rain colour; updated by the `theme` command.
        let matrixColor = '#2dd4bf';

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = matrixColor;
            ctx.font = fontSize + 'px "Roboto Mono"';
            for(let i = 0; i < drops.length; i++) {
                const text = characters[Math.floor(Math.random() * characters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // Pause the rain while the tab is hidden to save CPU/battery.
        let matrixTimer = setInterval(drawMatrix, 40);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(matrixTimer);
                matrixTimer = null;
            } else if (!matrixTimer) {
                matrixTimer = setInterval(drawMatrix, 40);
            }
        });
        
        // --- THEME SYSTEM ---
        const THEMES = {
            teal:  { primary: '#2dd4bf', accent: '#67e8f9', ghost: 'rgba(45, 212, 191, 0.3)' },
            green: { primary: '#00ff00', accent: '#00ffff', ghost: 'rgba(0, 255, 0, 0.3)' },
            amber: { primary: '#ffb000', accent: '#ffd479', ghost: 'rgba(255, 176, 0, 0.3)' },
            cyan:  { primary: '#22d3ee', accent: '#a5f3fc', ghost: 'rgba(34, 211, 238, 0.3)' },
        };

        // Resolve any CSS color (named / hex / rgb / hsl) to {r,g,b}, or null if invalid.
        function resolveColor(input) {
            if (!input || !window.CSS || !CSS.supports('color', input)) return null;
            const el = document.createElement('span');
            el.style.color = input;
            el.style.display = 'none';
            document.body.appendChild(el);
            const computed = getComputedStyle(el).color;
            document.body.removeChild(el);
            const m = computed.match(/\d+(\.\d+)?/g);
            if (!m || m.length < 3) return null;
            return { r: +m[0], g: +m[1], b: +m[2] };
        }

        function applyTheme(name) {
            name = (name || '').toLowerCase().trim();
            let primary, accent, ghost;

            if (THEMES[name]) {
                ({ primary, accent, ghost } = THEMES[name]);
            } else {
                // Treat the argument as an arbitrary CSS colour.
                const c = resolveColor(name);
                if (!c) return false;
                const lighten = (v) => Math.round(v + (255 - v) * 0.45);
                primary = `rgb(${c.r}, ${c.g}, ${c.b})`;
                accent = `rgb(${lighten(c.r)}, ${lighten(c.g)}, ${lighten(c.b)})`;
                ghost = `rgba(${c.r}, ${c.g}, ${c.b}, 0.3)`;
            }

            const root = document.documentElement.style;
            root.setProperty('--term-primary', primary);
            root.setProperty('--term-accent', accent);
            root.setProperty('--term-ghost', ghost);
            matrixColor = primary;
            try { localStorage.setItem('term-theme', name); } catch (e) {}
            return true;

        // --- "Did you mean?" via Levenshtein distance ---
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
                }
            }
            return dp[m][n];
        }

        function closestCommand(input) {
            let best = null, bestDist = Infinity;
            for (const cmd of MOCK_DATA.commands) {
                const d = levenshtein(input, cmd);
                if (d < bestDist) { bestDist = d; best = cmd; }
            }
            return bestDist <= 3 ? best : null;
        }

        inputLine.addEventListener('input', () => {
            const raw = inputLine.value;
            ghostInput.value = '';
            if (!raw) return;
            const spaceIdx = raw.indexOf(' ');
            if (spaceIdx !== -1) {
                // "<cmd> <partial-arg>" -> suggest a matching argument
                const cmd = raw.slice(0, spaceIdx);
                const argPartial = raw.slice(spaceIdx + 1).toLowerCase();
                const targets = ARG_TARGETS[cmd.toLowerCase()];
                if (targets) {
                    const m = targets.find(t => t.toLowerCase().startsWith(argPartial));
                    if (m) ghostInput.value = cmd + ' ' + m;
                }
            } else {
                const match = MOCK_DATA.commands.find(c => c.startsWith(raw.toLowerCase()));
                if (match) ghostInput.value = match;
            }
        });

        function typeLine(line, delay = 20) {
            return new Promise(resolve => {
                let i = 0;
                const p = document.createElement('div');
                p.className = 'output';
                outputContainer.appendChild(p);
                
                function type() {
                    if (bootSkipped) {
                        p.innerHTML = line;
                        terminal.scrollTop = terminal.scrollHeight;
                        resolve();
                        return;
                    }
                    if (i < line.length) {
                        p.innerHTML += line.charAt(i);
                        i++;
                        terminal.scrollTop = terminal.scrollHeight;
                        setTimeout(type, delay);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function typeRaw(html, delay = 20) {

        function typeProgressBar(steps = 20, duration = 1200) {

        // --- FLAPPY ROCKET (play flappy) ---
        function startFlappyGame() {
            return new Promise((resolve) => {
                const W = 360, H = 420, RX = 84, RR = 9;
                const GRAVITY = 0.34, FLAP = -5.6, MAXFALL = 7.2;
                const COLW = 48, GAP = 138, COLSPEED = 2.2, COLDIST = 185;

                const ctx = ui.ctx, primary = ui.primary, accent = ui.accent, scoreBar = ui.scoreBar, hint = ui.hint, overlay = ui.overlay;
                let high = 0; try { high = parseInt(localStorage.getItem('flappy-highscore') || '0', 10) || 0; } catch (e) {}
                let ry, vy, cols, score, over, waiting, loop, t;

                function updateBar() { scoreBar.innerHTML = "<span>SCORE <b style='color:" + primary + "'>" + score + "</b></span><span>HIGH <b style='color:" + primary + "'>" + Math.max(high, score) + "</b></span>"; }
                function restartLoop() { clearInterval(loop); loop = setInterval(step, 1000 / 40); }
                function spawnCol() {
                    const cy = 70 + Math.random() * (H - 140 - GAP);
                    cols.push({ x: W + 10, top: cy, passed: false, seed: Math.random() });
                }
                function reset() {
                    ry = H / 2; vy = 0; cols = []; score = 0; over = false; waiting = true; t = 0;
                    updateBar();
                    hint.innerHTML = "Space / &uarr; to thrust &nbsp;&middot;&nbsp; Q to quit";
                    restartLoop();

                function flap() {
                    if (over) return;
                    if (waiting) waiting = false;
                    vy = FLAP;
                    if (typeof SoundFX !== 'undefined' && SoundFX.playTone) SoundFX.playTone(620, 'triangle', 0.06, 0.035);
                }
                function step() {
                    if (over) return;
                    t++;
                    if (waiting) {
                        ry = H / 2 + Math.sin(t / 12) * 8;
                        draw(true);

                    vy = Math.min(MAXFALL, vy + GRAVITY);
                    ry += vy;
                    if (!cols.length || cols[cols.length - 1].x < W - COLDIST) spawnCol();
                    for (const c of cols) c.x -= COLSPEED;
                    cols = cols.filter(c => c.x + COLW > -10);
                    for (const c of cols) {

                            if (typeof SoundFX !== 'undefined' && SoundFX.playTone) SoundFX.playTone(880, 'square', 0.05, 0.04);

                if (!raw.trim()) return;
                const spaceIdx = raw.indexOf(' ');

                // Decide the candidate pool: arguments after a command, else commands
                let matches, prefixOut;
                if (spaceIdx !== -1) {
                    const cmd = raw.slice(0, spaceIdx);
                    const argPartial = raw.slice(spaceIdx + 1).toLowerCase();
                    const targets = ARG_TARGETS[cmd.toLowerCase()] || [];
                    matches = targets.filter(t => t.toLowerCase().startsWith(argPartial));
                    prefixOut = (p) => `${cmd} ${p}`;
                } else {
                    matches = MOCK_DATA.commands.filter(c => c.startsWith(raw.toLowerCase()));
                    prefixOut = (p) => p;
                }

                if (matches.length === 1) {
                    inputLine.value = prefixOut(matches[0]);
                    ghostInput.value = inputLine.value;
                } else if (matches.length > 1) {
                    // Complete to the longest common prefix shared by all matches...
                    let prefix = matches[0];
                    for (const m of matches) {
                        while (!m.toLowerCase().startsWith(prefix.toLowerCase())) prefix = prefix.slice(0, -1);
                    }
                    inputLine.value = prefixOut(prefix);
                    ghostInput.value = '';
                    // ...then list the candidates (bash-style).
                    typeRaw(matches.map(m => `<span class="nav-link" onclick="runCommandFromClick('${prefixOut(m)}')">${m}</span>`).join('  '));
                    terminal.scrollTop = terminal.scrollHeight;
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    inputLine.value = commandHistory[historyIndex];
                    ghostInput.value = inputLine.value;
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    inputLine.value = commandHistory[historyIndex];
                    ghostInput.value = inputLine.value;
                } else {
                    historyIndex = commandHistory.length;
                    inputLine.value = '';
                    ghostInput.value = '';
                }
            } else if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                outputContainer.innerHTML = '';
            }
        });
        
        // --- BOOT SEQUENCE LOGIC ---
        // We create a function to initialize the system after interaction
        const startSystem = async () => {
            // Remove the overlay
            overlay.style.display = 'none';

            // Initialize Audio
            SoundFX.init();
            SoundFX.startup(); // Play startup sound

            isTyping = true;
            inputLine.disabled = true;

            const skipBoot = () => { bootSkipped = true; };
            let skipHintEl = null;
            const finishReady = () => {
                document.removeEventListener('keydown', skipBoot);
                document.removeEventListener('click', skipBoot);
                if (skipHintEl) skipHintEl.remove(); // hint goes away once boot completes
                bootSkipped = false; // restore normal typing speed for command output
                inputLine.disabled = false;
                inputLine.focus();
                isTyping = false;
                try { sessionStorage.setItem('mdos-booted', '1'); } catch (e) {}
            };

            // Auto-skip the full boot if we've already booted this session
            let alreadyBooted = false;
            try { alreadyBooted = sessionStorage.getItem('mdos-booted') === '1'; } catch (e) {}
            if (alreadyBooted) {
                SoundFX.dataBurst();
                await typeRaw(`<div class="ascii-art">${ASCII_ART}</div>`);
                await typeLine("Welcome back, intruder. Type 'help' for a list of commands.", 5);
                finishReady();
                return;
            }

            await new Promise(r => setTimeout(r, 500));

            // From here on, any key / click fast-forwards the boot
            document.addEventListener('keydown', skipBoot);
            document.addEventListener('click', skipBoot);

            SoundFX.dataBurst();
            await typeRaw(`<div class="ascii-art">${ASCII_ART}</div>`);
            skipHintEl = document.createElement('div');
            skipHintEl.className = 'output';
            skipHintEl.innerHTML = `<span class="highlight-dim">[ press any key to skip ]</span>`;
            outputContainer.appendChild(skipHintEl);
            terminal.scrollTop = terminal.scrollHeight;

            SoundFX.compute();
            await typeLine("Booting MIIT-DAGA-OS v1.0...", 30);
            await typeProgressBar(20, 1000);
            await new Promise(r => setTimeout(r, bootSkipped ? 0 : 100));

            SoundFX.dataBurst();
            await typeLine("Connecting to network...", 30);
            await typeSpinner("Resolving DNS...", 600);
            await typeSpinner("Establishing secure tunnel...", 800);
            await typeLine("Connection established. ✓", 20);
            await new Promise(r => setTimeout(r, bootSkipped ? 0 : 100));

            SoundFX.compute();
            await typeLine("Authenticating user...", 30);
            await typeSpinner("Verifying identity", 400);
            await typeSpinner("Checking permissions", 300);
            await typeSpinner("Loading profile", 500);

            SoundFX.successChime();
            await typeLine("Access granted. Welcome, intruder.", 30);
            await typeLine("\nType 'help' for a list of commands.", 30);
            finishReady();
        };

        // Attach event listener to overlay to start system on click/key
        const handleStart = () => {
            startSystem();
            document.removeEventListener('keydown', handleStart);
            document.removeEventListener('click', handleStart);
        };

        overlay.addEventListener('click', handleStart);
        document.addEventListener('keydown', handleStart);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const newColumns = canvas.width / fontSize;
            drops.length = Math.floor(newColumns);
            for(let i = 0; i < drops.length; i++) {
                if(!drops[i]) drops[i] = 1;
            }
        });
    </script>
</body>
